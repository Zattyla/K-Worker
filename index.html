<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estúdio - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --text: #50404d; --glass: rgba(255, 255, 255, 0.5); --border: rgba(255, 255, 255, 0.7); --active: #ffb7b2; --bg: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); --nav: rgba(255, 255, 255, 0.8); --input: rgba(255, 255, 255, 0.7); }
        .dark-mode { --text: #eae2e8; --glass: rgba(40, 35, 45, 0.6); --border: rgba(255, 255, 255, 0.08); --active: #d4a5a5; --bg: linear-gradient(135deg, #231f24 0%, #2b2631 100%); --nav: rgba(35, 30, 40, 0.85); --input: rgba(0, 0, 0, 0.2); }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); background-attachment: fixed; color: var(--text); margin: 0; padding: 20px 20px 100px 20px; transition: 0.3s; }
        .glass-panel { background: var(--glass); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 24px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        h1, h2 { margin-top: 0; font-weight: 700; color: var(--text); }
        
        /* MENU DESLIZANTE */
        nav { position: fixed; bottom: 15px; left: 15px; right: 15px; display: flex; justify-content: flex-start; gap: 8px; background: var(--nav); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 20px; padding: 10px; z-index: 1000; overflow-x: auto; scrollbar-width: none; }
        nav::-webkit-scrollbar { display: none; }
        nav a { text-decoration: none; color: var(--text); padding: 10px 14px; border-radius: 14px; font-size: 0.75rem; font-weight: 600; transition: 0.3s; white-space: nowrap; flex-shrink: 0; }
        nav a.active { background: var(--active); color: #fff; transform: translateY(-3px); }
        
        input, textarea { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px; background: var(--input); color: var(--text); font-family: inherit; margin-bottom: 15px; box-sizing: border-box; outline: none; transition: 0.3s; }
        button { width: 100%; padding: 14px; border: none; border-radius: 12px; background: var(--active); color: #fff; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 5px;}
        ul { list-style: none; padding: 0; margin: 0; }
        li { background: var(--input); padding: 14px; margin-top: 10px; border-radius: 12px; display: flex; justify-content: space-between; border: 1px solid var(--border); font-size: 0.9rem; }
        .theme-btn { position: absolute; top: 20px; right: 20px; width: auto; padding: 8px 12px; border-radius: 20px; background: var(--glass); border: 1px solid var(--border); color: var(--text); font-size: 1.2rem; margin: 0; }
    </style>
</head>
<body>
    <script>if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');</script>
    <button class="theme-btn" onclick="toggleTheme()">🌗</button>

    <nav>
        <a href="index.html" class="active">To-Do</a>
        <a href="gerador.html">Gerador</a>
        <a href="galeria.html">Galeria</a>
        <a href="grupos.html">Grupos</a>
        <a href="portfolio.html">Portfólio</a>
        <a href="comebacks.html">Comebacks</a>
        <a href="fotos.html">Fotos</a>
    </nav>

    <div class="glass-panel" style="text-align: center; margin-top: 30px;">
        <h1 style="letter-spacing: 2px;">IDOL STUDIO</h1>
        <p style="font-size: 0.9rem; opacity: 0.7; margin: 0;">Painel de Controle</p>
    </div>

    <div class="glass-panel">
        <h2>Tarefas</h2>
        <input type="text" id="taskInput" placeholder="Nova tarefa...">
        <button onclick="addTask()">Adicionar</button>
        <ul id="taskList"></ul>
    </div>

    <div class="glass-panel">
        <h2>Backup Global</h2>
        <textarea id="backupArea" rows="3" placeholder="Código de segurança..."></textarea>
        <div style="display: flex; gap: 10px;">
            <button onclick="gerarBackup()" style="background: #b2cefe; color: #333;"> Gerar</button>
            <button onclick="restaurarBackup()" style="background: #dce3b5; color: #333;"> Restaurar</button>
        </div>
    </div>

    <script>
        function toggleTheme() { document.body.classList.toggle('dark-mode'); localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light'); }

        window.onload = carregarTarefas;
        function carregarTarefas() {
            const lista = document.getElementById('taskList');
            lista.innerHTML = '';
            const tarefas = JSON.parse(localStorage.getItem('minhasTarefas')) || [];
            tarefas.forEach((t, i) => {
                const li = document.createElement('li');
                li.innerHTML = `<span>${t}</span> <span onclick="removerTarefa(${i})" style="cursor:pointer; color: var(--active); font-weight: bold;">×</span>`;
                lista.appendChild(li);
            });
        }
        function addTask() {
            const input = document.getElementById('taskInput');
            if (!input.value.trim()) return;
            let tarefas = JSON.parse(localStorage.getItem('minhasTarefas')) || [];
            tarefas.push(input.value);
            localStorage.setItem('minhasTarefas', JSON.stringify(tarefas));
            input.value = ''; carregarTarefas();
        }
        function removerTarefa(i) {
            let tarefas = JSON.parse(localStorage.getItem('minhasTarefas'));
            tarefas.splice(i, 1); localStorage.setItem('minhasTarefas', JSON.stringify(tarefas));
            carregarTarefas();
        }

        // Backup 100% Completo (Salva até as fotos e comebacks)
        function gerarBackup() {
            const dados = { 
                idols: JSON.parse(localStorage.getItem('minhaGaleriaIdols'))||[], 
                grupos: JSON.parse(localStorage.getItem('meusGrupos'))||[], 
                tarefas: JSON.parse(localStorage.getItem('minhasTarefas'))||[],
                comebacks: JSON.parse(localStorage.getItem('meusComebacks'))||[],
                fotos: JSON.parse(localStorage.getItem('minhasFotos'))||[]
            };
            const txt = JSON.stringify(dados); document.getElementById('backupArea').value = txt;
            navigator.clipboard.writeText(txt).then(()=>alert("Backup copiado!")).catch(()=>alert("Copie o texto da caixa."));
        }
        function restaurarBackup() {
            try {
                const dados = JSON.parse(document.getElementById('backupArea').value);
                if(dados.idols) localStorage.setItem('minhaGaleriaIdols', JSON.stringify(dados.idols));
                if(dados.grupos) localStorage.setItem('meusGrupos', JSON.stringify(dados.grupos));
                if(dados.tarefas) localStorage.setItem('minhasTarefas', JSON.stringify(dados.tarefas));
                if(dados.comebacks) localStorage.setItem('meusComebacks', JSON.stringify(dados.comebacks));
                if(dados.fotos) localStorage.setItem('minhasFotos', JSON.stringify(dados.fotos));
                carregarTarefas(); alert("Tudo restaurado!"); document.getElementById('backupArea').value = '';
            } catch(e) { alert("Código inválido."); }
        }
    </script>
</body>
</html>
