<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moodboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --text: #50404d; --glass: rgba(255, 255, 255, 0.5); --border: rgba(255, 255, 255, 0.7); --active: #b2cefe; --bg: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); --nav: rgba(255, 255, 255, 0.8); --input: rgba(255, 255, 255, 0.7); }
        .dark-mode { --text: #eae2e8; --glass: rgba(40, 35, 45, 0.6); --border: rgba(255, 255, 255, 0.08); --active: #8ba8d4; --bg: linear-gradient(135deg, #231f24 0%, #2b2631 100%); --nav: rgba(35, 30, 40, 0.85); --input: rgba(0, 0, 0, 0.2); }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); background-attachment: fixed; color: var(--text); margin: 0; padding: 20px 20px 100px 20px; transition: 0.3s; }
        .glass-panel { background: var(--glass); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 24px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }

        /* NOVO MENU DESLIZANTE */
        nav { position: fixed; bottom: 15px; left: 15px; right: 15px; display: flex; justify-content: flex-start; gap: 8px; background: var(--nav); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 20px; padding: 10px; z-index: 1000; overflow-x: auto; scrollbar-width: none; }
        nav::-webkit-scrollbar { display: none; }
        nav a { text-decoration: none; color: var(--text); padding: 10px 14px; border-radius: 14px; font-size: 0.75rem; font-weight: 600; transition: 0.3s; white-space: nowrap; flex-shrink: 0; }
        nav a.active { background: var(--active); color: #333; transform: translateY(-3px); }

        .theme-btn { position: absolute; top: 20px; right: 20px; width: auto; padding: 8px 12px; border-radius: 20px; background: var(--glass); border: 1px solid var(--border); color: var(--text); font-size: 1.2rem; margin: 0;}
        select, input { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px; background: var(--input); color: var(--text); font-family: inherit; margin-bottom: 12px; outline: none; box-sizing: border-box; }
        button { width: 100%; padding: 14px; border: none; border-radius: 12px; background: var(--active); color: #333; font-weight: bold; cursor: pointer; transition: 0.3s; }

        .foto-card { background: var(--input); padding: 10px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 15px; }
        .foto-img { width: 100%; height: auto; border-radius: 12px; object-fit: cover; margin-bottom: 10px; background: rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <script>if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');</script>
    <button class="theme-btn" onclick="toggleTheme()">🌗</button>

    <nav>
        <a href="index.html">To-Do</a>
        <a href="gerador.html">Gerador</a>
        <a href="galeria.html">Galeria</a>
        <a href="grupos.html">Grupos</a>
        <a href="portfolio.html">Portfólio</a>
        <a href="comebacks.html">Comebacks</a>
        <a href="fotos.html" class="active">Fotos</a>
    </nav>

    <div class="glass-panel" style="margin-top: 30px;">
        <h2>Moodboard (Fotos)</h2>
        <select id="selectIdol">
            <option value="Conceito Geral">Conceito Geral / Inspiração</option>
        </select>
        <input type="text" id="imgUrl" placeholder="Cole o link da imagem (.jpg, .png)">
        <button onclick="salvarFoto()">Salvar Imagem</button>
    </div>

    <div id="gridFotos"></div>

    <script>
        function toggleTheme() { document.body.classList.toggle('dark-mode'); localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light'); }

        function carregarIdols() {
            const idols = JSON.parse(localStorage.getItem('minhaGaleriaIdols')) || [];
            const select = document.getElementById('selectIdol');
            idols.forEach(id => {
                const opt = document.createElement('option');
                opt.value = id.nome; opt.innerText = id.nome;
                select.appendChild(opt);
            });
        }

        function salvarFoto() {
            const url = document.getElementById('imgUrl').value.trim();
            const idol = document.getElementById('selectIdol').value;
            if(!url) return alert("Cole o link da imagem primeiro!");

            let fotos = JSON.parse(localStorage.getItem('minhasFotos')) || [];
            fotos.push({ idol: idol, url: url, data: new Date().toLocaleDateString() });
            localStorage.setItem('minhasFotos', JSON.stringify(fotos));
            document.getElementById('imgUrl').value = '';
            location.reload();
        }

        function exibirFotos() {
            const container = document.getElementById('gridFotos');
            const fotos = JSON.parse(localStorage.getItem('minhasFotos')) || [];
            if (!fotos.length) { container.innerHTML = '<p style="text-align:center; opacity:0.6;">Nenhuma foto salva.</p>'; return; }

            // Exibe as fotos da mais nova para a mais antiga
            [...fotos].reverse().forEach((f, idxOriginalInvertido) => {
                const idx = fotos.length - 1 - idxOriginalInvertido;
                const div = document.createElement('div');
                div.className = 'foto-card';
                // O 'onerror' garante que se o link estiver quebrado, não fica um ícone feio
                div.innerHTML = `
                    <img src="${f.url}" class="foto-img" onerror="this.src='https://via.placeholder.com/400x300?text=Link+Inválido';">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <h4 style="margin:0; color:var(--text);">${f.idol}</h4>
                            <span style="font-size:0.6rem; opacity:0.5;">${f.data}</span>
                        </div>
                        <button onclick="deletarFoto(${idx})" style="width:auto; padding:6px 12px; font-size:0.7rem; background:none; border:1px solid #ffb7b2; color:#ffb7b2;">Apagar</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function deletarFoto(i) {
            let fotos = JSON.parse(localStorage.getItem('minhasFotos'));
            fotos.splice(i, 1);
            localStorage.setItem('minhasFotos', JSON.stringify(fotos));
            location.reload();
        }

        carregarIdols();
        exibirFotos();
    </script>
</body>
</html>
