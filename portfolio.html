<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --text: #50404d; --glass: rgba(255, 255, 255, 0.5); --border: rgba(255, 255, 255, 0.7); --active: #b2cefe; --bg: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); --nav: rgba(255, 255, 255, 0.8); --input: rgba(255, 255, 255, 0.7); }
        .dark-mode { --text: #eae2e8; --glass: rgba(40, 35, 45, 0.6); --border: rgba(255, 255, 255, 0.08); --active: #8ba8d4; --bg: linear-gradient(135deg, #231f24 0%, #2b2631 100%); --nav: rgba(35, 30, 40, 0.85); --input: rgba(0, 0, 0, 0.2); }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); background-attachment: fixed; color: var(--text); margin: 0; padding: 20px 20px 100px 20px; transition: 0.3s; }
        .glass-panel { background: var(--glass); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 24px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        nav { position: fixed; bottom: 15px; left: 15px; right: 15px; display: flex; justify-content: space-around; background: var(--nav); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 20px; padding: 10px; z-index: 1000; }
        nav a { text-decoration: none; color: var(--text); padding: 10px 8px; border-radius: 14px; font-size: 0.7rem; font-weight: 600; transition: 0.3s; }
        nav a.active { background: var(--active); color: #333; transform: translateY(-3px); }
        .theme-btn { position: absolute; top: 20px; right: 20px; width: auto; padding: 8px 12px; border-radius: 20px; background: var(--glass); border: 1px solid var(--border); color: var(--text); font-size: 1.2rem; margin: 0;}
        .tag-conceito { font-size: 0.65rem; background: var(--active); color: #333; padding: 4px 10px; border-radius: 15px; font-weight: bold; text-transform: uppercase; }
        .membro-detalhe { background: var(--input); padding: 12px; border-radius: 12px; margin-top: 10px; border: 1px solid var(--border); }
        .label-detalhe { font-size: 0.7rem; opacity: 0.6; font-weight: bold; }
    </style>
</head>
<body>
    <script>if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');</script>
    <button class="theme-btn" onclick="toggleTheme()">🌗</button>

      <nav>
        <a href="index.html">To-Do</a>
        <a href="gerador.html">Gerador</a>
        <a href="galeria.html">Galeria</a>
        <a href="grupos.html">Grupos</a>
        <a href="portfolio.html">Portfólio</a>
        <a href="comebacks.html">Comebacks</a>
        <a href="fotos.html">Fotos</a>
    </nav>

    <h2 style="text-align: center; margin-top: 30px;">Agenciados</h2>
    <div id="lista"></div>

    <script>
        function toggleTheme() { document.body.classList.toggle('dark-mode'); localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light'); }
        function carregar() {
            const container = document.getElementById('lista');
            const grupos = JSON.parse(localStorage.getItem('meusGrupos')) || [];
            if (!grupos.length) { container.innerHTML = '<p style="text-align:center; opacity:0.6;">Nenhum grupo agenciado.</p>'; return; }
            container.innerHTML = '';
            grupos.forEach((g, i) => {
                let mH = '';
                g.membros.forEach(m => {
                    mH += `
                        <div class="membro-detalhe">
                            <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
                                <b>${m.nome} (${m.genero})</b>
                                <span style="font-size:0.75rem; color:var(--active); font-weight:bold;">${m.posicaoGrupo || m.posicao}</span>
                            </div>
                            <div class="label-detalhe">REF. VISUAL: ${m.faceClaim}</div>
                            <div class="label-detalhe">REF. VOCAL: ${m.voiceClaim || 'Indefinida'}</div>
                        </div>`;
                });
                const div = document.createElement('div'); div.className = 'glass-panel';
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:15px;">
                        <div><h3 style="margin:0;">${g.nome}</h3><span class="tag-conceito">${g.conceito||'N/A'}</span></div>
                        <span style="font-size:0.7rem; opacity:0.5;">${g.data||''}</span>
                    </div>
                    ${mH}
                    <button onclick="remover(${i})" style="width:100%; margin-top:15px; padding:10px; border-radius:10px; border:1px solid #ffb7b2; background:none; color:#ffb7b2; font-weight:bold; cursor:pointer;">Desfazer Grupo</button>`;
                container.appendChild(div);
            });
        }
        function remover(i) { if(confirm("Desfazer este grupo?")) { let g = JSON.parse(localStorage.getItem('meusGrupos')); g.splice(i, 1); localStorage.setItem('meusGrupos', JSON.stringify(g)); carregar(); } }
        carregar();
    </script>
</body>
</html>
