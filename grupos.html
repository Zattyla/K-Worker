<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formação</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --text: #50404d; --glass: rgba(255, 255, 255, 0.5); --border: rgba(255, 255, 255, 0.7); --active: #dce3b5; --bg: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); --nav: rgba(255, 255, 255, 0.8); --input: rgba(255, 255, 255, 0.7); }
        .dark-mode { --text: #eae2e8; --glass: rgba(40, 35, 45, 0.6); --border: rgba(255, 255, 255, 0.08); --active: #b5c7a5; --bg: linear-gradient(135deg, #231f24 0%, #2b2631 100%); --nav: rgba(35, 30, 40, 0.85); --input: rgba(0, 0, 0, 0.2); }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); background-attachment: fixed; color: var(--text); margin: 0; padding: 20px 20px 90px 20px; transition: 0.3s; }
        .glass-panel { background: var(--glass); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 24px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        h1, h2, h3 { margin-top: 0; font-weight: 700; color: var(--text); }
        nav { position: fixed; bottom: 15px; left: 15px; right: 15px; display: flex; justify-content: space-around; background: var(--nav); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 20px; padding: 10px; z-index: 1000; }
        nav a { text-decoration: none; color: var(--text); padding: 10px 12px; border-radius: 14px; font-size: 0.75rem; font-weight: 600; transition: 0.3s; }
        nav a.active { background: var(--active); color: #333; transform: translateY(-3px); }
        select, input { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px; background: var(--input); color: var(--text); font-family: inherit; margin-bottom: 15px; outline: none; }
        button { width: 100%; padding: 14px; border: none; border-radius: 12px; background: var(--active); color: #333; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .theme-btn { position: absolute; top: 20px; right: 20px; width: auto; padding: 8px 12px; border-radius: 20px; background: var(--glass); border: 1px solid var(--border); color: var(--text); font-size: 1.2rem; margin: 0;}
        .membro-detalhe { background: var(--input); padding: 12px; border-radius: 12px; margin-top: 10px; border-left: 5px solid var(--active); font-size: 0.9rem; border: 1px solid var(--border); }
    </style>
</head>
<body>
    <script>if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');</script>
    <button class="theme-btn" onclick="toggleTheme()">🌗</button>

    <nav>
        <a href="index.html">To-Do</a>
        <a href="gerador.html">Gerador</a>
        <a href="galeria.html">Galeria</a>
        <a href="grupos.html">Grupos</a>
        <a href="portfolio.html">Portfólio</a>
        <a href="comebacks.html">Comebacks</a>
        <a href="fotos.html">Fotos</a>
    </nav>

    <div class="glass-panel" style="margin-top: 30px;">
        <h2>Debut Simulator</h2>
        <input type="text" id="n" placeholder="Nome (Ex: ILLIT)">
        <select id="c"><option>Y2K</option><option>Dark</option><option>Ethereal</option><option>Crush</option></select>
        <div style="display:flex; gap:10px;">
            <select id="t"><option value="F">Fem</option><option value="M">Masc</option><option value="MIX">Misto</option></select>
            <input type="number" id="q" value="4" min="2">
        </div>
        <button onclick="formar()">Gerar Lineup</button>
    </div>
    
    <div id="res" class="glass-panel" style="display:none">
        <div id="cont"></div>
        <button style="background:#b2cefe; margin-top:15px;" onclick="salvar()"> Salvar</button>
    </div>

    <script>
        function toggleTheme() { document.body.classList.toggle('dark-mode'); localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light'); }
        let atual = null;
        function formar() {
            const gal = JSON.parse(localStorage.getItem('minhaGaleriaIdols')) || [];
            const t = document.getElementById('t').value, q = parseInt(document.getElementById('q').value);
            let fil = t === "MIX" ? [...gal] : gal.filter(i => i.genero === t);
            if (fil.length < q) return alert("Idols insuficientes.");
            let sort = fil.sort(()=>0.5 - Math.random()).slice(0, q);
            let c = ["Main Vocal", "Main Dancer", "Visual", "Lead Vocal"].sort(()=>0.5 - Math.random());
            sort.forEach((m, i) => m.posicaoGrupo = i===0 ? "Líder" : (i===sort.length-1 ? "Maknae" : c[i]||"Sub"));
            atual = { nome: document.getElementById('n').value || "UNIT", conceito: document.getElementById('c').value, membros: sort, data: new Date().toLocaleDateString() };
            let html = `<h3>${atual.nome} (${atual.conceito})</h3>`;
            sort.forEach(m => html += `<div class="membro-detalhe"><b>${m.nome}</b><br><span style="font-size:0.8rem">${m.posicaoGrupo} | ${m.faceClaim}</span></div>`);
            document.getElementById('cont').innerHTML = html; document.getElementById('res').style.display = 'block';
        }
        function salvar() { let s = JSON.parse(localStorage.getItem('meusGrupos'))||[]; s.push(atual); localStorage.setItem('meusGrupos', JSON.stringify(s)); alert("Salvo!"); }
    </script>
</body>
</html>
