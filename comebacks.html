<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comebacks</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --text: #50404d; --glass: rgba(255, 255, 255, 0.5); --border: rgba(255, 255, 255, 0.7); --active: #ffb2e6; --bg: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); --nav: rgba(255, 255, 255, 0.8); --input: rgba(255, 255, 255, 0.7); }
        .dark-mode { --text: #eae2e8; --glass: rgba(40, 35, 45, 0.6); --border: rgba(255, 255, 255, 0.08); --active: #d4a5c5; --bg: linear-gradient(135deg, #231f24 0%, #2b2631 100%); --nav: rgba(35, 30, 40, 0.85); --input: rgba(0, 0, 0, 0.2); }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); background-attachment: fixed; color: var(--text); margin: 0; padding: 20px 20px 100px 20px; transition: 0.3s; }
        .glass-panel { background: var(--glass); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 24px; padding: 20px; margin-bottom: 20px; }
        
        nav { position: fixed; bottom: 15px; left: 15px; right: 15px; display: flex; justify-content: flex-start; gap: 8px; background: var(--nav); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 20px; padding: 10px; z-index: 1000; overflow-x: auto; scrollbar-width: none; }
        nav::-webkit-scrollbar { display: none; }
        nav a { text-decoration: none; color: var(--text); padding: 10px 14px; border-radius: 14px; font-size: 0.75rem; font-weight: 600; transition: 0.3s; white-space: nowrap; flex-shrink: 0; }
        nav a.active { background: var(--active); color: #fff; transform: translateY(-3px); }
        
        select, input, button { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px; background: var(--input); color: var(--text); font-family: inherit; margin-bottom: 12px; outline: none; }
        button { border: none; background: var(--active); font-weight: 700; cursor: pointer; color: #fff; }
        .theme-btn { position: absolute; top: 20px; right: 20px; width: auto; padding: 8px 12px; border-radius: 20px; background: var(--glass); border: 1px solid var(--border); color: var(--text); font-size: 1.2rem; }
    </style>
</head>
<body>
    <script>if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');</script>
    <button class="theme-btn" onclick="toggleTheme()">🌗</button>

    <nav>
        <a href="index.html">To-Do</a>
        <a href="gerador.html">Gerador</a>
        <a href="galeria.html">Galeria</a>
        <a href="grupos.html">Grupos</a>
        <a href="portfolio.html">Portfólio</a>
        <a href="comebacks.html" class="active">Comebacks</a>
        <a href="fotos.html">Fotos</a>
    </nav>

    <div class="glass-panel" style="margin-top: 30px;">
        <h2>Comebacks</h2>
        <select id="sg"></select>
        <input type="text" id="al" placeholder="Álbum">
        <input type="text" id="tt" placeholder="Title">
        <button onclick="salvar()">Lançar</button>
    </div>
    <div id="lista"></div>

    <script>
        function toggleTheme() { document.body.classList.toggle('dark-mode'); localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light'); }
        function carregarGrupos() {
            const gr = JSON.parse(localStorage.getItem('meusGrupos')) || [];
            const s = document.getElementById('sg');
            gr.forEach(g => { const o = document.createElement('option'); o.value = g.nome; o.innerText = g.nome; s.appendChild(o); });
        }
        function salvar() {
            const cb = { grupo: document.getElementById('sg').value, album: document.getElementById('al').value, track: document.getElementById('tt').value };
            if(!cb.album) return;
            let cbs = JSON.parse(localStorage.getItem('meusComebacks')) || [];
            cbs.push(cb); localStorage.setItem('meusComebacks', JSON.stringify(cbs)); location.reload();
        }
        function carregar() {
            const cbs = JSON.parse(localStorage.getItem('meusComebacks')) || [];
            const container = document.getElementById('lista');
            cbs.forEach((c, i) => {
                const d = document.createElement('div'); d.className = 'glass-panel';
                d.innerHTML = `<h3>${c.album} - ${c.grupo}</h3><p>🎵 Title: ${c.track}</p><button onclick="remover(${i})" style="background:none; border:none; color:#ffb7b2; cursor:pointer; font-weight:bold; font-size:0.7rem;">[ Arquivar ]</button>`;
                container.appendChild(d);
            });
        }
        function remover(i) { let cbs = JSON.parse(localStorage.getItem('meusComebacks')); cbs.splice(i, 1); localStorage.setItem('meusComebacks', JSON.stringify(cbs)); location.reload(); }
        carregarGrupos(); carregar();
    </script>
</body>
</html>
