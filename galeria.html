<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --text: #50404d; --glass: rgba(255, 255, 255, 0.5); --border: rgba(255, 255, 255, 0.7); --active: #ffb7b2; --bg: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); --nav: rgba(255, 255, 255, 0.8); --input: rgba(255, 255, 255, 0.7); }
        .dark-mode { --text: #eae2e8; --glass: rgba(40, 35, 45, 0.6); --border: rgba(255, 255, 255, 0.08); --active: #d4a5a5; --bg: linear-gradient(135deg, #231f24 0%, #2b2631 100%); --nav: rgba(35, 30, 40, 0.85); --input: rgba(0, 0, 0, 0.2); }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); background-attachment: fixed; color: var(--text); margin: 0; padding: 20px 20px 100px 20px; transition: 0.3s; }
        .glass-panel { background: var(--glass); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 24px; padding: 20px; margin-bottom: 20px; }
        
        nav { position: fixed; bottom: 15px; left: 15px; right: 15px; display: flex; justify-content: flex-start; gap: 8px; background: var(--nav); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 20px; padding: 10px; z-index: 1000; overflow-x: auto; scrollbar-width: none; }
        nav::-webkit-scrollbar { display: none; }
        nav a { text-decoration: none; color: var(--text); padding: 10px 14px; border-radius: 14px; font-size: 0.75rem; font-weight: 600; transition: 0.3s; white-space: nowrap; flex-shrink: 0; }
        nav a.active { background: var(--active); color: #fff; transform: translateY(-3px); }
        
        .theme-btn { position: absolute; top: 20px; right: 20px; width: auto; padding: 8px 12px; border-radius: 20px; background: var(--glass); border: 1px solid var(--border); color: var(--text); font-size: 1.2rem; }
        .btn { width: 48%; padding: 12px; border-radius: 12px; border: none; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>
    <script>if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');</script>
    <button class="theme-btn" onclick="toggleTheme()">🌗</button>

    <nav>
        <a href="index.html">To-Do</a>
        <a href="gerador.html">Gerador</a>
        <a href="galeria.html" class="active">Galeria</a>
        <a href="grupos.html">Grupos</a>
        <a href="portfolio.html">Portfólio</a>
        <a href="comebacks.html">Comebacks</a>
        <a href="fotos.html">Fotos</a>
    </nav>

    <h2 style="text-align: center; margin-top: 30px;">Banco de Talentos</h2>
    <div id="lista"></div>

    <script>
        function toggleTheme() { document.body.classList.toggle('dark-mode'); localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light'); }
        function carregar() {
            const container = document.getElementById('lista');
            const idols = JSON.parse(localStorage.getItem('minhaGaleriaIdols')) || [];
            if (!idols.length) { container.innerHTML = '<p style="text-align:center; opacity:0.6;">Vazio.</p>'; return; }
            container.innerHTML = '';
            idols.forEach((id, i) => {
                const div = document.createElement('div'); div.className = 'glass-panel';
                div.innerHTML = `
                    <h3>${id.nome} (${id.genero})</h3>
                    <p style="font-size:0.85rem; margin:5px 0;"><strong>Face:</strong> ${id.faceClaim}</p>
                    <p style="font-size:0.85rem; margin:5px 0;"><strong>Voz:</strong> ${id.voiceClaim || 'N/A'}</p>
                    <div style="display:flex; justify-content:space-between; margin-top:15px;">
                        <button class="btn" style="background:#dce3b5; color:#333;" onclick="copiar(${i})"> Copiar</button>
                        <button class="btn" style="background:#ffb7b2; color:#fff;" onclick="remover(${i})">️ Apagar</button>
                    </div>`;
                container.appendChild(div);
            });
        }
        function remover(i) { let idls = JSON.parse(localStorage.getItem('minhaGaleriaIdols')); idls.splice(i, 1); localStorage.setItem('minhaGaleriaIdols', JSON.stringify(idls)); carregar(); }
        function copiar(i) { const id = JSON.parse(localStorage.getItem('minhaGaleriaIdols'))[i]; navigator.clipboard.writeText(`Idol: ${id.nome}\nFace: ${id.faceClaim}`).then(()=>alert("Copiado!")); }
        carregar();
    </script>
</body>
</html>
